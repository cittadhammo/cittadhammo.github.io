<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    @page {
      size: 598.0mm 598.0mm;
      margin: 0;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: white !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    html {
      background-color: white !important;
    }
    object {
      display: block;
      width: 594.0mm;
      height: 594.0mm;
      margin: 2.0mm 2.0mm 2.0mm 2.0mm;
      border: none;
      outline: none;
      background-color: white !important;
    }
    
    .license-container {
      position: absolute;
      bottom: 10mm;
      right: 10mm;
      display: flex;
      flex-direction: row;
      align-items: center;
      opacity: 1.0;
      color: #333333;
      font-family: 'Poppins', sans-serif;
      z-index: 100;
      transform: scale(1.6);
      transform-origin: bottom right;
    }
    .license-text {
      text-align: right;
      font-weight: 500;
      font-size: 8pt;
      line-height: 1.2;
      margin-right: 2mm;
    }

    .license-logo {
      height: 8mm;
      
    }

  </style>
</head>
<body>
  <object data="../svgs/path-to-nibbana.svg" type="image/svg+xml"></object>
  
  <div class="license-container">
    <div class="license-text">
      <div>DhammaCharts.org</div><div>Freely Available</div>
    </div>
    <img class="license-logo" src="../icons/cc-zero.svg">
  </div>

</body>
</html>
