name: Deploy Site

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'gh-pages') || contains(github.event.head_commit.message, 'cf-pages')
    env:
      FORCE_ASSETS: ${{ contains(github.event.head_commit.message, 'force-assets') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve target deploy branch
        id: deploy_branch
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"cf-pages"* ]]; then
            echo "name=cf-pages" >> "$GITHUB_OUTPUT"
          else
            echo "name=gh-pages" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect asset-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            assets:
              - 'vault/content/**'
              - 'vault/assets/images/**'
              - 'scripts/generate_assets.sh'
              - 'scripts/map-template.html'
              - '_config.yml'
              - '_config_local.yml'

      - name: Restore generated assets from deploy branch
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: ${{ steps.deploy_branch.outputs.name }}
          path: .deploy-cache
          fetch-depth: 1

      - name: Copy cached generated assets
        run: |
          mkdir -p assets/images
          if [ -d ".deploy-cache/assets/images" ]; then
            cp -a .deploy-cache/assets/images/. assets/images/
            echo "Restored cached assets/images from ${{ steps.deploy_branch.outputs.name }} branch."
          else
            echo "No cached assets/images found on ${{ steps.deploy_branch.outputs.name }} branch."
          fi

      - name: Decide whether to generate assets
        id: should_generate_assets
        run: |
          run_assets="false"
          reason="No asset-related changes detected."

          if [ "${FORCE_ASSETS}" = "true" ]; then
            run_assets="true"
            reason="Manual override via commit message contains force-assets."
          elif [ "${{ steps.changes.outputs.assets }}" = "true" ]; then
            run_assets="true"
            reason="Asset-related files changed."
          elif [ ! -d "assets/images" ] || [ -z "$(find assets/images -mindepth 1 -print -quit)" ]; then
            run_assets="true"
            reason="No cached generated assets available; forcing generation."
          fi

          echo "run=$run_assets" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "$reason"

      - name: Install asset tooling
        if: steps.should_generate_assets.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y libvips-tools imagemagick

      - name: Configure ImageMagick limits for large assets
        if: steps.should_generate_assets.outputs.run == 'true'
        run: |
          set -euo pipefail
          for policy in /etc/ImageMagick-6/policy.xml /etc/ImageMagick-7/policy.xml; do
            if [ -f "$policy" ]; then
              echo "Patching $policy"
              sudo cp "$policy" "${policy}.bak"
              sudo sed -Ei 's|(name="memory"[[:space:]]+value=")[^"]*(")|\14GiB\2|g' "$policy"
              sudo sed -Ei 's|(name="map"[[:space:]]+value=")[^"]*(")|\18GiB\2|g' "$policy"
              sudo sed -Ei 's|(name="disk"[[:space:]]+value=")[^"]*(")|\132GiB\2|g' "$policy"
              sudo sed -Ei 's|(name="area"[[:space:]]+value=")[^"]*(")|\10\2|g' "$policy"
              sudo sed -Ei 's|(name="width"[[:space:]]+value=")[^"]*(")|\132KP\2|g' "$policy"
              sudo sed -Ei 's|(name="height"[[:space:]]+value=")[^"]*(")|\132KP\2|g' "$policy"
            fi
          done

      - name: Show ImageMagick limits
        if: steps.should_generate_assets.outputs.run == 'true'
        run: |
          set +e
          echo "ImageMagick version:"
          (magick -version || convert -version)
          echo ""
          echo "ImageMagick policy:"
          (magick -list policy || convert -list policy)
          echo ""
          echo "ImageMagick resources:"
          (magick -list resource || convert -list resource)

      - name: Install yq
        if: steps.should_generate_assets.outputs.run == 'true'
        run: |
          YQ_VERSION=v4.43.1
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o yq
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Make script executable
        if: steps.should_generate_assets.outputs.run == 'true'
        run: chmod +x scripts/generate_assets.sh

      - name: Generate thumbnails and tiles
        if: steps.should_generate_assets.outputs.run == 'true'
        env:
          MAGICK_MEMORY_LIMIT: 4GiB
          MAGICK_MAP_LIMIT: 8GiB
          MAGICK_DISK_LIMIT: 32GiB
          MAGICK_AREA_LIMIT: 0
          MAGICK_WIDTH_LIMIT: 32KP
          MAGICK_HEIGHT_LIMIT: 32KP
          MAGICK_THREAD_LIMIT: 2
          MAGICK_TMPDIR: /tmp
          R2_TILES_BASE_URL: ${{ steps.deploy_branch.outputs.name == 'cf-pages' && secrets.R2_PUBLIC_URL || '' }}
        run: ./scripts/generate_assets.sh

      - name: Skip asset generation
        if: steps.should_generate_assets.outputs.run != 'true'
        run: echo "Skipping asset generation. ${{ steps.should_generate_assets.outputs.reason }}"

      # -----------------------------------------------------------------
      # R2 sync — cf-pages only, only when assets were regenerated
      # -----------------------------------------------------------------

      - name: Install rclone
        if: |
          steps.deploy_branch.outputs.name == 'cf-pages' &&
          steps.should_generate_assets.outputs.run == 'true'
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Sync tiles to R2
        if: |
          steps.deploy_branch.outputs.name == 'cf-pages' &&
          steps.should_generate_assets.outputs.run == 'true'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          echo "Syncing tiles to R2..."
          rclone copy ./assets/images r2:${{ secrets.R2_BUCKET_NAME }}/assets/images \
            --include "*/tiles/**" \
            --include "*/tiles-dark/**" \
            --transfers 16 \
            --checkers 16 \
            --stats 10s \
            -v
          echo "R2 sync complete."

      - name: Remove tiles from local assets before Jekyll build
        if: steps.deploy_branch.outputs.name == 'cf-pages'
        run: |
          echo "Removing tile directories (served from R2, not needed in _site)..."
          find ./assets/images -type d -name "tiles" -exec rm -rf {} + 2>/dev/null || true
          find ./assets/images -type d -name "tiles-dark" -exec rm -rf {} + 2>/dev/null || true
          REMAINING=$(find ./assets/images -type f | wc -l)
          echo "Done. Remaining files in assets/images: $REMAINING"

      # -----------------------------------------------------------------
      # Jekyll build
      # -----------------------------------------------------------------

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: |
          bundle exec jekyll build \
            --config _config.yml,_config_${{ steps.deploy_branch.outputs.name == 'cf-pages' && 'cdn' || 'gh' }}.yml

      # -----------------------------------------------------------------
      # Deploy
      # -----------------------------------------------------------------

      - name: Deploy to GitHub Pages
        if: steps.deploy_branch.outputs.name == 'gh-pages'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Push to cf-pages branch
        if: steps.deploy_branch.outputs.name == 'cf-pages'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: cf-pages
