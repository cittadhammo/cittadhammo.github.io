baseurl: ""
url: "http://localhost:4000"
# Prevent Jekyll from wiping the symlink during builds
keep_files:
  - assets/images
exclude:
  - README.md
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby
  - script/
  - vault
  - Makefile
  - build.sh
  - scripts/
  - GEMINI.md
  - CHECK.md
  - assets/images
