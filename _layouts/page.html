<!doctype html>
<html lang="en">
  <head>
    <title>{{ page.title }}</title>
    <meta name="author" content="{{ site.author }}">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords" content="{{ site.keywords }}">
    {% include head.html %}
  </head>

  <body class="black">
    {% assign area_name = page.collection %}
    {% assign area = site.data.areas | where: 'name', area_name | first %}
    {% assign area_title = area.title %}
    {% include headerCustom.html subTitle=area_title inverted=true area_name=area_name %}
    <main class="home">
      {{ content }}
    </main>
    {% include footer.html %}
    <!-- <script src="{{ "/assets/scripts/vendor/scrollreveal.min.js" | prepend: site.baseurl }}"></script> -->
    <script src="{{ '/assets/scripts/home.js' | prepend: site.baseurl }}"></script>
  </body>
</html>
