# Theme config
theme:
  default: "light" # Initial mode on first visit: "auto" follows browser/system preference.
  allow_user_toggle: true # Show the theme toggle and persist user choice in localStorage.
  respect_prefers_color_scheme: false # When default is "auto", use prefers-color-scheme (dark => dark, else light).
  toggle_show_auto_label: false # If true, toggle can show an "Auto" label/state in UI.
  scroll_reveal: true # If false, ScrollReveal is disabled site-wide.
  home_hero_landing: false # If true, show a full-screen hero on home with title/logo/area links.
  home_hero_follow_theme: true # If false, hero stays in dark style even when the site theme is light.
  home_hero_hide_on_scroll_cue: true # If true, clicking the hero bottom arrow hides the hero after scrolling.
  page_scroll_reveal_default: false # If true, page-layout pages use scroll reveal unless overridden in frontmatter.
  # Order of metadata blocks in item pages (omit keys you want hidden).
  item_meta_order:
    - author
    - year
    - license
    - techs
    - code
    - references
    - sources
    - downloads

  item_meta_compact: false # If true, item metadata blocks can flow horizontally and wrap.
  # Per-metadata wide rules for compact meta layout.
  # Supported values:
  # - "never": never force full-row width
  # - "always": always force full-row width
  # - "count:N": full-row when item count >= N
  item_meta_compact_wide:
    author: "never"
    year: "never"
    license: "never"
    techs: "never"
    code: "never"
    references: "always"
    sources: "always"
    downloads: "always"
  item_aside_gap: "1rem" # Gap between images in the aside gallery on item pages.
  item_navigation_cross_section: true # If true, navigation can jump between areas and categories.
# Site config
# baseurl: "https://www.dhammacharts.org/old-website"
# url: "https://cittadhammo.github.io"
baseurl: ""
url: "https://www.dhammacharts.org"
highlighter: rouge
sass:
  sass_dir: assets/scss
  style: compressed
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
# Config file
collections_dir: vault/content
data_dir: vault/data
img_ext: webp # Default image extension for charts and diagrams thumbnails
# img_ext: jpg # Default image extension for charts and diagrams thumbnails
# img_ext: "png" # Default image extension for charts and diagrams thumbnails
darkify:
  method: "invert_lightness" # Dark conversion method for generated dark assets.
  # replace | multiply | invert_lightness | replace_only
  suffix: "dark" # Suffix used for generated dark variants (e.g. medium-dark.webp).
  invert_level:
    default: "5%,95%" # -level for original dark files and dark map tiles.
    small: "0%,50%" # -level for small-dark.webp (brightest thumbnail profile).
    medium: "2%,60%" # -level for medium-dark.webp.
    large: "3%,70%" # -level for large-dark.webp.
# The collections represent the areas of the websites.
# Add collections below if you add a new _collection folder into content[:w
collections:
  charts:
    output: true
    sort_by: year
    reverse: true
  3d-printing:
    output: true
    sort_by: order
    reverse: true
  writtings:
    output: true
    sort_by: order
    reverse: true
  references:
    output: true
    sort_by: order
    reverse: true
  food:
    output: true
    sort_by: order
    reverse: true
  projects:
    output: true
    sort_by: order
    reverse: true
# Layout defaults:
# - collection items use `item`
# - generic fallback uses `default` (safe for non-area pages)
# - area reference pages should explicitly set `layout: page`
defaults:
  - scope:
      path: ""
      type: charts
    values:
      layout: item
  - scope:
      path: ""
      type: 3d-printing
    values:
      layout: item
  - scope:
      path: ""
      type: writtings
    values:
      layout: item
  - scope:
      path: ""
      type: references
    values:
      layout: item
  - scope:
      path: ""
      type: projects
    values:
      layout: item
  - scope:
      path: ""
    values:
      layout: "default"
# Add any folder that need not to be included in the build website.
include: ["well-known"]
exclude:
  - _config_cdn.yml
  - _config_gh.yml
  - _config_local.yml
  - AGENTS.md
  - README.md
  - LICENSE.md
  - .bundle
  - .devcontainer
  - .github
  - .obsidian
  - .sass-cache
  - .jekyll-cache
  - .gitignore
  - _site
  - "*.swp"
  - ".DS_Store"
  - gemfiles
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby
  - script/
  - vault
  - Makefile
  - build.sh
  - scripts/
  - GEMINI.md
  - CHECK.md
  - QUOTE.md
  - OPTIMISATION.md
  - OPTIMISATION2.md
  - CLOUDFLARE_SETUP.md
  - LIGHTONLY_DARKONLY_DEBUG.md
  - PLAN-icon-overlay.md
