# User config
email: "dhammacharts@protonmail.com"
author: "DhammaCharts"
title: "DhammaCharts"
description: "Dhamma Charts and Art."
logo: "/assets/icons/logo300.png"
discord_url: "https://discord.gg/MkyKZh8ANy"
contribute_url: "/references/info/contribute.html"
footer:
  blocks:
    - title: "Contact"
      items:
        - type: email_obfuscated
          source_key: email
    - title: "Connect"
      items:
        - type: link
          label: "Discord"
          source_key: discord_url
          external: true
          title: "Discord"
        - type: link
          label: "Contribute"
          source_key: contribute_url
          relative_url: true
          title: "Contribute"
# Theme config
theme:
  default: "auto" # Initial mode on first visit: "auto" follows browser/system preference.
  allow_user_toggle: true # Show the theme toggle and persist user choice in localStorage.
  respect_prefers_color_scheme: true # When default is "auto", use prefers-color-scheme (dark => dark, else light).
  toggle_show_auto_label: false # If true, toggle can show an "Auto" label/state in UI.
# Site config
# baseurl: "https://www.dhammacharts.org/old-website"
baseurl: ""
url: "https://cittadhammo.github.io"
highlighter: rouge
sass:
  sass_dir: assets/scss
  style: compressed
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
# Config file
collections_dir: vault/content
data_dir: vault/data
img_ext: webp # Default image extension for charts and diagrams thumbnails
# img_ext: jpg # Default image extension for charts and diagrams thumbnails
# img_ext: "png" # Default image extension for charts and diagrams thumbnails
darkify:
  method: "invert_lightness" # Dark conversion method for generated dark assets.
  # replace | multiply | invert_lightness | replace_only
  suffix: "dark" # Suffix used for generated dark variants (e.g. medium-dark.webp).
  invert_level:
    default: "5%,95%" # -level for original dark files and dark map tiles.
    small: "0%,50%" # -level for small-dark.webp (brightest thumbnail profile).
    medium: "2%,60%" # -level for medium-dark.webp.
    large: "3%,70%" # -level for large-dark.webp.
# The collections represent the areas of the websites.
# Add collections below if you add a new _collection folder into content[:w
collections:
  charts:
    output: true
    sort_by: order
  3d-printing:
    output: true
    sort_by: order
  writtings:
    output: true
    sort_by: order
  references:
    output: true
    sort_by: order
  food:
    output: true
    sort_by: order
  projects:
    output: true
    sort_by: order
# This will add default layout to all items into categories.
# For pages, make sure to specify a layout in the frontmatter
defaults:
  - scope:
      path: ""
      type: charts
    values:
      layout: item
  - scope:
      path: ""
      type: 3d-printing
    values:
      layout: item
  - scope:
      path: ""
      type: writtings
    values:
      layout: item
  - scope:
      path: ""
      type: references
    values:
      layout: item
  - scope:
      path: ""
      type: food
    values:
      layout: item
  - scope:
      path: ""
      type: projects
    values:
      layout: item
  - scope:
      path: ""
    values:
      layout: "page"
# Add any folder that need not to be included in the build website.
include: ["well-known"]
exclude:
  - _config_cdn.yml
  - _config_gh.yml
  - _config_local.yml
  - AGENTS.md
  - README.md
  - LICENSE.md
  - .bundle
  - .devcontainer
  - .github
  - .obsidian
  - .sass-cache
  - .jekyll-cache
  - .gitignore
  - _site
  - "*.swp"
  - ".DS_Store"
  - gemfiles
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby
  - script/
  - vault
  - Makefile
  - build.sh
  - scripts/
  - GEMINI.md
  - CHECK.md
  - QUOTE.md
